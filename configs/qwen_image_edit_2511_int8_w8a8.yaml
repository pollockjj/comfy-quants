project:
  name: qwen-image-edit-2511-int8-w8a8-v0
  created_by: comfy_quants
  seed: 42
model:
  family: qwen_image_edit
  model_id: Qwen/Qwen-Image-Edit-2511
  revision: "<pin-this>"
  dtype: bf16
  source: huggingface
  components:
    transformer: quantize
    visual_semantic_path: keep_bf16
    vae: keep_bf16
    text_encoder: keep_bf16
hardware:
  device: cuda:0
  gpu_profile: rtx_pro_6000_blackwell_96gb
  max_vram_gb: 88
  cpu_offload: true
  nvme_offload: false
  scratch_dir: runs/qwen-edit-2511/scratch
quant:
  algorithm: int8_w8a8
  target_dtype: int8_w8a8
  scale:
    granularity: per_channel
    axis: out_features
    method: amax
  rounding: nearest_even
  # Matches ComfyUI-INT8-Fast's qwen exclusion list; visual_semantic_path kept bf16
  # via keep_components below (it is also a non-quantizable component in the contract).
  modules:
    include: []
    exclude:
      - "*time_text_embed*"
      - "*img_in*"
      - "*norm_out*"
      - "*proj_out*"
      - "*txt_in*"
      - "*visual_semantic_path*"
  fallback:
    on_error: keep_bf16
artifact:
  format: safetensors_quant
  compatibility_target: L2
  write_module_reports: true
